<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Мониторинг сервера</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f 0%, #2a2a3a 100%);
            color: #eee;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: rgba(30, 30, 40, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
        }
        .card-title {
            font-size: 1.2em;
            margin-bottom: 15px;
            color: #00d2ff;
            border-left: 3px solid #00d2ff;
            padding-left: 10px;
        }
        .metric {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .metric-label {
            color: #aaa;
        }
        .metric-value {
            font-weight: bold;
            font-family: monospace;
            font-size: 1.1em;
        }
        .progress-bar {
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            height: 20px;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            transition: width 0.3s;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            border-radius: 10px;
        }
        .progress-fill.warning {
            background: linear-gradient(90deg, #ff6a00, #ee0979);
        }
        .core-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 10px;
        }
        .core {
            background: #333;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 0.8em;
            flex: 1;
            text-align: center;
            min-width: 50px;
        }
        .temp {
            color: #ffaa44;
        }
        .error {
            color: #ff5555;
            text-align: center;
            padding: 20px;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 0.8em;
        }
        .refresh {
            text-align: right;
            font-size: 0.7em;
            color: #666;
        }
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            body {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Мониторинг сервера</h1>
        <div class="refresh" id="refresh-info">Обновление...</div>

        <div class="stats-grid" id="stats-grid">
            <div class="card">
                <div class="card-title">💻 Процессор</div>
                <div id="cpu-stats">Загрузка...</div>
            </div>

            <div class="card">
                <div class="card-title">🧠 Оперативная память</div>
                <div id="ram-stats">Загрузка...</div>
            </div>

            <div class="card">
                <div class="card-title">💾 Диски</div>
                <div id="disk-stats">Загрузка...</div>
            </div>

            <div class="card">
                <div class="card-title">⏱️ Система</div>
                <div id="system-stats">Загрузка...</div>
            </div>

            <div class="card">
                <div class="card-title">🌐 Сеть</div>
                <div id="network-stats">Загрузка...</div>
            </div>

            <div class="card">
                <div class="card-title">🔋 Питание</div>
                <div id="battery-stats">Загрузка...</div>
            </div>
        </div>
        <div class="footer">
            Обновляется каждые 2 секунды
        </div>
    </div>

    <script>
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function formatUptime(days, hours, minutes) {
            let parts = [];
            if (days > 0) parts.push(`${days} д`);
            if (hours > 0) parts.push(`${hours} ч`);
            if (minutes > 0) parts.push(`${minutes} мин`);
            return parts.join(' ') || 'менее минуты';
        }

        function formatNetwork(bytes) {
            if (bytes < 1024) return `${bytes} B`;
            if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
            if (bytes < 1024 * 1024 * 1024) return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
            return `${(bytes / 1024 / 1024 / 1024).toFixed(2)} GB`;
        }

        function updateStats() {
            fetch('/api/stats')
                .then(res => res.json())
                .then(data => {
                    if (data.error) {
                        document.querySelectorAll('.card').forEach(card => {
                            card.innerHTML = `<div class="error">❌ Ошибка: ${data.error}</div>`;
                        });
                        return;
                    }

                    // CPU Stats
                    const tempHtml = data.cpu.temperature ? ` | 🌡️ <span class="temp">${data.cpu.temperature.toFixed(1)}°C</span>` : '';
                    const coresHtml = data.cpu.percent_per_core.map((core, i) =>
                        `<div class="core">Core ${i}: ${core}%</div>`
                    ).join('');

                    document.getElementById('cpu-stats').innerHTML = `
                        <div class="metric">
                            <span class="metric-label">Общая загрузка:</span>
                            <span class="metric-value">${data.cpu.percent}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill ${data.cpu.percent > 80 ? 'warning' : ''}" style="width: ${data.cpu.percent}%"></div>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Ядер:</span>
                            <span class="metric-value">${data.cpu.cores}</span>
                        </div>
                        <div class="core-grid">${coresHtml}</div>
                        ${tempHtml ? `<div class="metric"><span class="metric-label">Температура:</span><span class="metric-value temp">${data.cpu.temperature.toFixed(1)}°C</span></div>` : ''}
                    `;

                    // RAM Stats
                    document.getElementById('ram-stats').innerHTML = `
                        <div class="metric">
                            <span class="metric-label">Всего:</span>
                            <span class="metric-value">${formatBytes(data.memory.total)}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Использовано:</span>
                            <span class="metric-value">${formatBytes(data.memory.used)} (${data.memory.percent}%)</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill ${data.memory.percent > 80 ? 'warning' : ''}" style="width: ${data.memory.percent}%"></div>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Свободно:</span>
                            <span class="metric-value">${formatBytes(data.memory.free)}</span>
                        </div>
                        ${data.memory.swap_total > 0 ? `
                        <div class="metric">
                            <span class="metric-label">Swap:</span>
                            <span class="metric-value">${formatBytes(data.memory.swap_used)} / ${formatBytes(data.memory.swap_total)} (${data.memory.swap_percent}%)</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${data.memory.swap_percent}%"></div>
                        </div>
                        ` : ''}
                    `;

                    // Disk Stats
                    let diskHtml = '';
                    data.disks.forEach(disk => {
                        diskHtml += `
                            <div class="metric">
                                <span class="metric-label">${disk.device} (${disk.mount}):</span>
                                <span class="metric-value">${formatBytes(disk.used)} / ${formatBytes(disk.total)} (${disk.percent}%)</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill ${disk.percent > 80 ? 'warning' : ''}" style="width: ${disk.percent}%"></div>
                            </div>
                        `;
                    });
                    document.getElementById('disk-stats').innerHTML = diskHtml || '<div class="metric">Нет данных</div>';

                    // System Stats (Uptime)
                    document.getElementById('system-stats').innerHTML = `
                        <div class="metric">
                            <span class="metric-label">Аптайм:</span>
                            <span class="metric-value">${formatUptime(data.uptime.days, data.uptime.hours, data.uptime.minutes)}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Всего секунд:</span>
                            <span class="metric-value">${Math.floor(data.uptime.seconds)}</span>
                        </div>
                    `;

                    // Network Stats
                    document.getElementById('network-stats').innerHTML = `
                        <div class="metric">
                            <span class="metric-label">Отправлено:</span>
                            <span class="metric-value">📤 ${formatNetwork(data.network.sent)}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Получено:</span>
                            <span class="metric-value">📥 ${formatNetwork(data.network.recv)}</span>
                        </div>
                    `;

                    // Battery Stats
                    if (data.battery) {
                        const status = data.battery.plugged ? '🔌 От сети' : '🔋 От батареи';
                        const timeLeft = data.battery.seconds_left ? ` (осталось ${Math.floor(data.battery.seconds_left / 60)} мин)` : '';
                        document.getElementById('battery-stats').innerHTML = `
                            <div class="metric">
                                <span class="metric-label">Заряд:</span>
                                <span class="metric-value">${data.battery.percent}%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${data.battery.percent}%"></div>
                            </div>
                            <div class="metric">
                                <span class="metric-label">Статус:</span>
                                <span class="metric-value">${status}${timeLeft}</span>
                            </div>
                        `;
                    } else {
                        document.getElementById('battery-stats').innerHTML = '<div class="metric">Нет данных (не ноутбук)</div>';
                    }

                    document.getElementById('refresh-info').innerHTML = `Обновлено: ${new Date().toLocaleTimeString()}`;
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('refresh-info').innerHTML = '❌ Ошибка подключения к серверу';
                });
        }

        // Первое обновление сразу
        updateStats();
        // И каждые 2 секунды
        setInterval(updateStats, 2000);
    </script>
</body>
</html>
